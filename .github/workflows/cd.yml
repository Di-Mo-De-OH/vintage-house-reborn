name: CD

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: black
        run: uv run black --check .

      - name: ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy app

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ""
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
      REFRESH_TOKEN_EXPIRE_DAYS: ${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: |
          set +e
          uv run coverage run -m pytest
          exit_code=$?
          set -e
          if [ $exit_code -eq 5 ]; then exit 0; else exit $exit_code; fi

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vintage-house-reborn:latest

  deploy:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Add GitHub Actions IP to Security Group
        run: |
          MY_IP=$(curl -s https://checkip.amazonaws.com)
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SG_ID }} \
            --protocol tcp --port 22 --cidr $MY_IP/32

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/vintage-house-reborn
            git pull origin main
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" > env/.env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> env/.env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> env/.env
            echo "POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}" >> env/.env
            echo "POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}" >> env/.env
            echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> env/.env
            echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> env/.env
            echo "REDIS_DB=${{ secrets.REDIS_DB }}" >> env/.env
            echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> env/.env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> env/.env
            echo "ALGORITHM=${{ secrets.ALGORITHM }}" >> env/.env
            echo "ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" >> env/.env
            echo "REFRESH_TOKEN_EXPIRE_DAYS=${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}" >> env/.env
            echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> env/.env
            echo "SMTP_PORT=${{ secrets.SMTP_PORT }}" >> env/.env
            echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> env/.env
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" >> env/.env
            docker-compose --env-file env/.env -f docker-compose.prod.yml pull
            docker-compose --env-file env/.env -f docker-compose.prod.yml up -d

      - name: Remove GitHub Actions IP from Security Group
        if: always()
        run: |
          MY_IP=$(curl -s https://checkip.amazonaws.com)
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SG_ID }} \
            --protocol tcp --port 22 --cidr $MY_IP/32

      - name: Discord 알림
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_CD }}
          status: ${{ job.status }}
          title: "🚀 배포 결과"
          description: "vintage-house-reborn 배포가 완료됐어요"
          color: 0x00ff00
          username: "배포봇"