name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: black
        run: uv run black --check .

      - name: ruff
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy app

      - name: Discord 알림
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_CI }}
          status: ${{ job.status }}
          title: "CI 결과 - Lint 결과"

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: |
          set +e
          uv run coverage run -m pytest
          exit_code=$?
          set -e
          if [ $exit_code -eq 5 ]; then exit 0; else exit $exit_code; fi

      - name: Discord 알림
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_CI }}
          status: ${{ job.status }}
          title: "CI 결과 - Test 결과"